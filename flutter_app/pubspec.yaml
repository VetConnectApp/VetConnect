name: vetconnect
description: VetConnect - Rural Livestock Management & Telemedicine
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # State Management
  provider: ^6.1.2

  # UI / Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Hardware
  mobile_scanner: ^5.2.3
  nfc_manager: ^3.5.0

  # Storage & Utils
  shared_preferences: ^2.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
